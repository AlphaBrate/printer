<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Printer Spooler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <!-- Context Menu with Blur Transition -->
    <div id="customContextMenu"
        class="opacity-0 pointer-events-none scale-95 blur-[6px] bg-white/80 dark:bg-[#242424]/80 backdrop-blur-xl">
        <button class="context-item group" onclick="duplicateTargetPage()">
            <svg xmlns="http://www.w3.org/2000/svg" class="mr-3 w-[18px] h-[18px] opacity-70 transition-colors"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Duplicate Page
        </button>
        <button class="context-item group" onclick="toggleTargetPageMenuAction()">
            <svg xmlns="http://www.w3.org/2000/svg" class="mr-3 w-[18px] h-[18px] opacity-70 transition-colors"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            Toggle Print State
        </button>
        <div class="context-divider"></div>
        <button class="context-item danger group" onclick="deleteTargetPage()">
            <svg xmlns="http://www.w3.org/2000/svg" class="mr-3 w-[18px] h-[18px] opacity-70 transition-colors"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            Delete Page
        </button>
    </div>

    <div class="dialog-container">
        <div class="preview-sidebar" id="dropZone">
            <div class="flex justify-between items-center mb-2 z-20 relative">
                <h2 class="section-title mb-0">Queue & Order</h2>
                <button onclick="document.getElementById('fileInput').click()"
                    class="text-sm text-blue-500 font-medium hover:text-blue-600 transition-colors">Add Media</button>
                <input type="file" id="fileInput" class="hidden" multiple accept="*" onchange="handleFiles(this.files)">
            </div>

            <div id="emptyState"
                class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-all duration-500 opacity-100">
                <div
                    class="text-center opacity-40 text-sm font-medium transition-transform duration-500 transform scale-100">
                    <span class="text-4xl block mb-4">📄</span>
                    Drop PDF or Images<br>Drag pages to reorder
                </div>
            </div>

            <div id="previewList"
                class="relative w-full z-10 transition-[height] duration-400 ease-[cubic-bezier(0.25,1,0.5,1)]">
                <!-- Dynamic Absolute Positioned Cards Here -->
            </div>
        </div>

        <div class="settings-panel">
            <div>
                <div class="section-title">Destination</div>
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium">Target Printer</span>
                        <select id="printerSelect" class="w-[300px]" onchange="updatePrinterCapabilities()">
                        </select>
                    </div>
                    <div class="flex justify-between items-center opacity-50 mt-1">
                        <span class="text-xs font-medium">System Name</span>
                        <span class="text-xs font-mono bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded"
                            id="printerSystemName">Not Selected</span>
                    </div>
                </div>
            </div>

            <div class="group-box space-y-5">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium">Copies</span>
                    <input type="number" id="copies" value="1" min="1" class="w-24" onchange="updateUI()">
                </div>

                <div>
                    <span class="text-sm font-medium block mb-4">Print Range</span>
                    <div class="flex flex-col gap-4">
                        <label class="flex items-center gap-3 text-sm cursor-pointer group">
                            <input type="radio" name="pageRange" value="all" checked onchange="updateUI()"
                                class="accent-blue-500 w-4 h-4 transition-transform group-hover:scale-110">
                            <span class="transition-colors group-hover:text-blue-500">All active pages</span>
                        </label>
                        <div class="flex items-center gap-3 text-sm">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="radio" name="pageRange" value="range" onchange="updateUI()"
                                    class="accent-blue-500 w-4 h-4 transition-transform group-hover:scale-110">
                                <span class="transition-colors group-hover:text-blue-500">From</span>
                            </label>
                            <input type="number" id="rangeFrom" value="1" min="1"
                                class="w-20 h-10 transition-all duration-300 disabled:opacity-30 disabled:scale-95"
                                disabled onchange="updateUI()">
                            <span class="opacity-70">to</span>
                            <input type="number" id="rangeTo" value="1" min="1"
                                class="w-20 h-10 transition-all duration-300 disabled:opacity-30 disabled:scale-95"
                                disabled onchange="updateUI()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div class="group-box">
                    <span class="section-title">Canvas</span>
                    <div class="flex flex-col gap-5 mt-3">
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-medium">Paper</span>
                            <select id="paperSize" class="text-sm w-full ml-4" onchange="updateUI()">
                                <option value="A4">A4</option>
                                <option value="A3">A3</option>
                                <option value="Letter">Letter</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="group-box">
                    <span class="section-title">Coloring</span>
                    <div class="flex flex-col gap-5 mt-3">
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-medium">Scale %</span>
                            <input type="number" id="scaling" value="100" class="w-24 text-sm" onchange="updateUI()">
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-medium">Color Mode</span>
                            <select id="colorMode" class="text-sm w-32" onchange="updateUI()">
                                <option value="color">Full Color</option>
                                <option value="mono">Grayscale</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div
                class="mt-auto flex justify-between items-center pt-8 border-t border-gray-200 dark:border-gray-800 relative z-20">
                <div class="flex flex-col transition-all duration-300">
                    <div class="text-[15px] font-semibold text-gray-800 dark:text-gray-200 flex items-center h-[24px]"
                        id="jobSummary">
                        <div id="numContainer"
                            class="transition-[width] duration-300 ease-[cubic-bezier(0.16,1,0.3,1)] relative h-full flex items-center overflow-visible">
                            <span id="summaryNumber"
                                class="inline-block origin-bottom whitespace-nowrap absolute left-0">No</span>
                        </div>
                        <div id="labelContainer"
                            class="transition-[width] duration-300 ease-[cubic-bezier(0.16,1,0.3,1)] ml-[4px] relative h-full flex items-center overflow-visible">
                            <span id="summaryLabel"
                                class="inline-block origin-bottom whitespace-nowrap absolute left-0">Page</span>
                        </div>
                        <div class="ml-[4px] flex items-center h-full">Ready</div>
                    </div>
                    <div class="text-xs text-red-500 font-medium mt-1 h-4 transition-opacity duration-300 opacity-0"
                        id="rangeWarning">
                        Warning: Start page exceeds end page.
                    </div>
                </div>
                <div class="flex gap-4 items-center">
                    <div class="relative">
                        <button
                            class="px-6 py-2 text-sm font-medium opacity-60 hover:opacity-100 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-all duration-200 relative z-10"
                            onclick="showResetPopup()">Reset All</button>

                        <div id="resetPopup"
                            class="absolute bottom-full mb-[18px] left-1/2 -translate-x-1/2 bg-white dark:bg-[#323232] shadow-2xl border border-gray-200 dark:border-gray-600 rounded-xl p-5 w-56 z-50 transition-all duration-300 ease-out opacity-0 pointer-events-none translate-y-3 scale-95">
                            <div
                                class="absolute -bottom-[10px] left-1/2 -translate-x-1/2 w-5 h-5 bg-white dark:bg-[#323232] border-b border-r border-gray-200 dark:border-gray-600 transform rotate-45 pointer-events-none shadow-[4px_4px_10px_rgba(0,0,0,0.05)]">
                            </div>

                            <div class="relative z-10">
                                <p class="text-sm font-semibold mb-4 text-center">Clear all pages?</p>
                                <div class="flex gap-3">
                                    <button
                                        class="flex-1 bg-red-500 hover:bg-red-600 text-white rounded-lg py-2 text-sm font-medium transition-colors"
                                        onclick="confirmReset()">Yes</button>
                                    <button
                                        class="flex-1 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 rounded-lg py-2 text-sm font-medium transition-colors"
                                        onclick="hideResetPopup()">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button id="printBtn" class="btn-primary" onclick="executePrint()" disabled>Send Print
                        Command</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/index.js"></script>

</body>

</html>
